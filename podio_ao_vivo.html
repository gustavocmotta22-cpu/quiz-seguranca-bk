<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podio ao Vivo — Quiz de Segurança BK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  :root{--red:#D62300;--orange:#F5821F;--yellow:#F4C300;--dark:#1A1A1A;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#0d0d0d 0%,#1a0a00 50%,#0d0d0d 100%);min-height:100vh;color:#fff;padding:16px;}

  /* ── HEADER ── */
  .top{text-align:center;padding:20px 0 16px;}
  .top .crown{font-size:48px;display:block;margin-bottom:8px;}
  .top h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .top p{font-size:13px;color:rgba(255,255,255,.55);margin-top:5px;font-weight:600;}
  .live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(214,35,0,.2);border:1px solid rgba(214,35,0,.4);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;color:#ff6b6b;margin-top:8px;}
  .live-dot{width:8px;height:8px;background:#ff4444;border-radius:50%;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
  .refresh-info{font-size:11px;color:rgba(255,255,255,.35);margin-top:6px;}

  /* ── PODIO VISUAL ── */
  .podio-wrap{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:24px 8px 0;min-height:200px;}
  .podio-col{display:flex;flex-direction:column;align-items:center;flex:1;max-width:120px;}
  .podio-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:8px;position:relative;border:3px solid transparent;}
  .podio-col.p1 .podio-avatar{border-color:var(--gold);background:radial-gradient(circle,#2a2000,#1a1000);box-shadow:0 0 20px rgba(255,215,0,.4);}
  .podio-col.p2 .podio-avatar{border-color:var(--silver);background:radial-gradient(circle,#1a1a1a,#111);box-shadow:0 0 12px rgba(192,192,192,.3);}
  .podio-col.p3 .podio-avatar{border-color:var(--bronze);background:radial-gradient(circle,#1a0d00,#110800);box-shadow:0 0 12px rgba(205,127,50,.3);}
  .podio-name{font-size:12px;font-weight:800;color:#fff;text-align:center;line-height:1.2;margin-bottom:4px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .podio-store{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;text-align:center;margin-bottom:8px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .podio-score{font-size:13px;font-weight:900;margin-bottom:3px;}
  .p1 .podio-score{color:var(--gold);}
  .p2 .podio-score{color:var(--silver);}
  .p3 .podio-score{color:var(--bronze);}
  .podio-time{font-size:11px;color:rgba(255,255,255,.5);font-weight:700;margin-bottom:6px;}
  .podio-block{border-radius:10px 10px 0 0;width:100%;display:flex;align-items:center;justify-content:center;}
  .p1 .podio-block{height:90px;background:linear-gradient(180deg,rgba(255,215,0,.25),rgba(255,215,0,.05));border:1px solid rgba(255,215,0,.3);}
  .p2 .podio-block{height:65px;background:linear-gradient(180deg,rgba(192,192,192,.2),rgba(192,192,192,.03));border:1px solid rgba(192,192,192,.25);}
  .p3 .podio-block{height:48px;background:linear-gradient(180deg,rgba(205,127,50,.2),rgba(205,127,50,.03));border:1px solid rgba(205,127,50,.25);}
  .block-num{font-size:28px;font-weight:900;}
  .p1 .block-num{color:var(--gold);}
  .p2 .block-num{color:var(--silver);}
  .p3 .block-num{color:var(--bronze);}
  .crown-icon{position:absolute;top:-18px;font-size:20px;}
  .empty-pod{font-size:11px;color:rgba(255,255,255,.25);font-style:italic;text-align:center;padding-bottom:8px;}

  /* ── TABELA RANKING ── */
  .ranking-wrap{margin-top:20px;}
  .ranking-title{font-size:13px;font-weight:900;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .ranking-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1);}
  .rank-row{display:flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;margin-bottom:8px;gap:12px;transition:all .3s;}
  .rank-row.top3{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.08);}
  .rank-pos{font-size:15px;font-weight:900;min-width:28px;text-align:center;}
  .rank-pos.r1{color:var(--gold);}
  .rank-pos.r2{color:var(--silver);}
  .rank-pos.r3{color:var(--bronze);}
  .rank-pos.rn{color:rgba(255,255,255,.35);}
  .rank-info{flex:1;min-width:0;}
  .rank-name{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rank-store{font-size:11px;color:rgba(255,255,255,.45);font-weight:600;}
  .rank-right{text-align:right;}
  .rank-score{font-size:15px;font-weight:900;color:var(--yellow);}
  .rank-time{font-size:11px;color:rgba(255,255,255,.45);font-weight:700;margin-top:1px;}
  .rank-pts{font-size:10px;color:rgba(255,255,255,.3);font-weight:700;}

  /* ── ESTADO VAZIO / CARREGANDO ── */
  .empty-state{text-align:center;padding:40px 20px;}
  .empty-state .ei{font-size:48px;display:block;margin-bottom:12px;}
  .empty-state p{color:rgba(255,255,255,.4);font-size:14px;font-weight:600;}

  .loading{text-align:center;padding:30px;color:rgba(255,255,255,.4);font-size:14px;font-weight:700;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}

  /* ── BOTAO ATUALIZAR ── */
  .btn-refresh{width:100%;padding:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;margin-top:16px;transition:all .2s;}
  .btn-refresh:active{background:rgba(255,255,255,.12);}
  .last-update{text-align:center;font-size:11px;color:rgba(255,255,255,.25);margin-top:8px;font-weight:600;}

  /* ── STATS ── */
  .stats-row{display:flex;gap:8px;margin:16px 0;}
  .stat{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px;text-align:center;}
  .stat-n{font-size:20px;font-weight:900;color:var(--orange);}
  .stat-l{font-size:10px;color:rgba(255,255,255,.4);font-weight:700;text-transform:uppercase;}
</style>
</head>
<body>

<div style="max-width:500px;margin:0 auto;">

  <!-- HEADER -->
  <div class="top">
    <span class="crown">&#x1F3C6;</span>
    <h1>Podio ao Vivo</h1>
    <p>Quiz de Segurança do Trabalho — Burger King</p>
    <div class="live-badge"><span class="live-dot"></span> AO VIVO</div>
    <div class="refresh-info">Atualiza automaticamente a cada 15s</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="st-total">—</div><div class="stat-l">Participantes</div></div>
    <div class="stat"><div class="stat-n" id="st-avg">—</div><div class="stat-l">Média Acertos</div></div>
    <div class="stat"><div class="stat-n" id="st-best">—</div><div class="stat-l">Melhor Tempo</div></div>
  </div>

  <!-- PODIO VISUAL -->
  <div class="podio-wrap" id="podio-visual">
    <div class="loading"><div class="spinner"></div>Carregando ranking...</div>
  </div>

  <!-- RANKING COMPLETO -->
  <div class="ranking-wrap">
    <div class="ranking-title">&#x1F4CB; Classificacao geral</div>
    <div id="ranking-list">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <button class="btn-refresh" onclick="load()">&#x21BA; Atualizar Agora</button>
  <div class="last-update" id="last-update"></div>

</div>

<script>
// ─────────────────────────────────────────────
// CONFIG — mesma URL do Apps Script
// ─────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyysEwUHK6xiUdHLrbJiK0MvNBntIo_KXyORUnH5YtyNnxAoy9_B6kJXgTbUxOaU9nT/exec';

let allData = [];

// ─────────────────────────────────────────────
// CARREGAR DADOS
// ─────────────────────────────────────────────
async function load(){
  if(!SCRIPT_URL||SCRIPT_URL==='https://script.google.com/macros/s/AKfycbyysEwUHK6xiUdHLrbJiK0MvNBntIo_KXyORUnH5YtyNnxAoy9_B6kJXgTbUxOaU9nT/exec'){
    document.getElementById('podio-visual').innerHTML='<div class="empty-state"><span class="ei">⚙️</span><p>Cole a URL do Apps Script no arquivo para ativar o podio.</p></div>';
    document.getElementById('ranking-list').innerHTML='';
    return;
  }
  try{
    const r = await fetch(SCRIPT_URL+'?action=get&t='+Date.now());
    const d = await r.json();
    allData = d.resultados || [];
    render();
    document.getElementById('last-update').textContent='Ultima atualização: '+new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    document.getElementById('podio-visual').innerHTML='<div class="empty-state"><span class="ei">📡</span><p>Erro ao carregar dados. Verifique a conexão.</p></div>';
    document.getElementById('ranking-list').innerHTML='';
  }
}

// ─────────────────────────────────────────────
// PONTUAÇÃO: acertos primeiro, depois menor tempo
// quem tiver mais acertos ganha; empate = menor tempo
// ─────────────────────────────────────────────
function pontuar(r){ return r.acertos*10000 - r.tempo; }

function rank(data){
  return [...data].sort((a,b)=>pontuar(b)-pontuar(a));
}

// ─────────────────────────────────────────────
// RENDERIZAR
// ─────────────────────────────────────────────
function render(){
  const sorted = rank(allData);
  renderStats(sorted);
  renderPodio(sorted);
  renderList(sorted);
}

function renderStats(sorted){
  const n = sorted.length;
  document.getElementById('st-total').textContent = n||'0';
  if(n===0){document.getElementById('st-avg').textContent='—';document.getElementById('st-best').textContent='—';return;}
  const avg = (sorted.reduce((s,r)=>s+r.acertos,0)/n).toFixed(1);
  document.getElementById('st-avg').textContent = avg+'/5';
  const best = sorted.reduce((m,r)=>r.tempo<m?r.tempo:m,Infinity);
  document.getElementById('st-best').textContent = best===Infinity?'—':fmt(best);
}

function renderPodio(sorted){
  const wrap = document.getElementById('podio-visual');
  if(sorted.length===0){
    wrap.innerHTML='<div class="empty-state"><span class="ei">⏳</span><p>Aguardando participantes...</p></div>';
    return;
  }
  // Layout: 2° | 1° | 3°
  const order=[1,0,2]; // índices de sorted
  const cls=['p2','p1','p3'];
  const medals=['🥈','🥇','🥉'];
  const blockNums=['2°','1°','3°'];
  const crowns=['','👑',''];

  let html='';
  order.forEach((idx,col)=>{
    const p=sorted[idx];
    const colCls=cls[col];
    if(!p){
      html+='<div class="podio-col '+colCls+'"><div class="empty-pod">—</div><div class="podio-block"><span class="block-num">'+blockNums[col]+'</span></div></div>';
      return;
    }
    const firstName = p.nome.split(' ')[0];
    html+=`
      <div class="podio-col ${colCls}">
        <div class="podio-avatar">
          ${crowns[col]?'<span class="crown-icon">'+crowns[col]+'</span>':''}
          ${medals[col]}
        </div>
        <div class="podio-name">${esc(firstName)}</div>
        <div class="podio-store">${esc(p.loja)}</div>
        <div class="podio-score">${p.acertos}/5 ✅</div>
        <div class="podio-time">⏱ ${fmt(p.tempo)}</div>
        <div class="podio-block"><span class="block-num">${blockNums[col]}</span></div>
      </div>`;
  });
  wrap.innerHTML=html;
}

function renderList(sorted){
  const el=document.getElementById('ranking-list');
  if(sorted.length===0){el.innerHTML='';return;}
  const posClass=['r1','r2','r3'];
  const posIcon=['🥇','🥈','🥉'];
  el.innerHTML=sorted.map((r,i)=>{
    const top=i<3;
    const pc=i<3?posClass[i]:'rn';
    const pi=i<3?posIcon[i]:(i+1)+'°';
    return `<div class="rank-row${top?' top3':''}">
      <div class="rank-pos ${pc}">${pi}</div>
      <div class="rank-info">
        <div class="rank-name">${esc(r.nome)}</div>
        <div class="rank-store">🏪 ${esc(r.loja)}</div>
      </div>
      <div class="rank-right">
        <div class="rank-score">${r.acertos}/5 ✅</div>
        <div class="rank-time">⏱ ${fmt(r.tempo)}</div>
        <div class="rank-pts">Pts: ${pontuar(r).toLocaleString('pt-BR')}</div>
      </div>
    </div>`;
  }).join('');
}

function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Auto-refresh a cada 15s
load();
setInterval(load,15000);
</script>
</body>
</html>
